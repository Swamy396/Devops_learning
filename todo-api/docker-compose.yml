services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: todo_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/todos.db   # persisted via volume
    volumes:
      - db_data:/data                          # SQLite persistence
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Optional: swap SQLite for PostgreSQL ─────────────────────────────────
  # Uncomment the block below and update DATABASE_URL in api to:
  # postgresql://todo_user:todo_pass@db:5432/tododb
  #
  # db:
  #   image: postgres:16-alpine
  #   container_name: todo_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: todo_user
  #     POSTGRES_PASSWORD: todo_pass
  #     POSTGRES_DB: tododb
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U todo_user -d tododb"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  db_data:
  # pg_data:   # uncomment with Postgres block
