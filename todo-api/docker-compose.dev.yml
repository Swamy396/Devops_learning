# Development override — hot-reload + source mount
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    build:
      target: builder          # use builder stage (has all dev tools)
    volumes:
      - ./app:/app/app         # live-reload source changes
      - db_data:/data
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
